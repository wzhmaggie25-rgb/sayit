<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent;font-family:system-ui,sans-serif;user-select:none;pointer-events:none}
body{display:flex;align-items:center;justify-content:flex-end;flex-direction:column;padding-bottom:20px}

/* === Typeless audio-bar === */
.audio-bar{display:flex;align-items:flex-end;gap:2px;justify-content:center;padding:0 12px;position:relative}
.bar{flex-shrink:0;border-radius:9999px;transition:width .08s cubic-bezier(0.4,0,0.2,1),background-color .2s ease}
/* Gradient masks (12px each side) */
.fade-l,.fade-r{display:none;position:absolute;top:0;width:12px;height:100%;pointer-events:none}
.fade-l{left:0;background:linear-gradient(to left,transparent,rgba(38,38,38,.95))}
.fade-r{right:0;background:linear-gradient(to right,transparent,rgba(38,38,38,.95))}

/* === Card === */
.card{pointer-events:auto;display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:24px;background:rgba(38,38,38,.95);border:1px solid rgba(255,255,255,.06);box-shadow:0 8px 32px rgba(0,0,0,.35);height:46px}

/* === Dot === */
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:0;transition:opacity .2s}
.dot.on{opacity:1;background:#dc2626;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}

/* === Timer === */
.timer{font-size:10px;color:#777;font-family:monospace;min-width:36px;text-align:center}

/* === Status (Thinking/Done) === */
.status{font-size:10px;color:#999;min-width:50px;text-align:center}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.status.thinking{background:linear-gradient(90deg,rgba(242,241,240,.7) 0%,rgba(242,241,240,1) 50%,rgba(242,241,240,.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 100%;animation:shimmer 1.5s ease-out infinite}

/* === Buttons === */
.btn{width:28px;height:28px;border-radius:50%;border:none;display:none;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;color:#999;background:transparent}
.btn.show{display:flex}
.btn-x:hover{background:#dc2626;color:#fff}
.btn-ok{background:#4d8bff;color:#fff}.btn-ok:hover{background:#3b7de6}
</style></head><body>

<!-- IDLE: 10 gray bars (Typeless default) -->
<div id="idleBars" class="audio-bar" style="height:24px"></div>

<!-- CARD (hidden initially, shown during recording) -->
<div class="card" id="card" style="display:none">
  <div class="dot" id="dot"></div>
  <span class="status" id="status"></span>
  <div class="audio-bar" id="waveWrap" style="height:22px">
    <div class="fade-l" id="fadeL"></div>
    <div class="fade-r" id="fadeR"></div>
  </div>
  <span class="timer" id="timer">00:00</span>
  <div class="dot" id="dotR"></div>
  <button class="btn btn-x" id="btnX" onclick="if(window.sayit)window.sayit.stopRecording()">✕</button>
  <button class="btn btn-ok" id="btnOk" onclick="if(window.sayit)window.sayit.stopRecording()">✓</button>
</div>

<script>
(function(){
  // IDLE: 10 static bars
  var idleWrap=document.getElementById('idleBars');
  for(var i=0;i<10;i++){var b=document.createElement('div');b.className='bar';b.style.cssText='width:2px;height:2px;background:#808080';idleWrap.appendChild(b)}

  // ACTIVE: 26 animated bars
  var bars=[],anim=null,timer=null,s=0,lvl=0;
  var waveWrap=document.getElementById('waveWrap');
  for(var i=0;i<26;i++){var wb=document.createElement('div');wb.className='bar';wb.style.cssText='width:2px;height:2px;background:rgba(255,255,255,0.5)';waveWrap.appendChild(wb);bars.push(wb)}

  function run(){anim=requestAnimationFrame(run);
    for(var i=0;i<bars.length;i++){
      var h=Math.max(2,Math.min(22,2+lvl*20*(0.3+0.7*Math.sin(i*0.4+Date.now()*.008))));
      bars[i].style.height=h+'px';
      bars[i].style.background=lvl>0.1?'rgba(255,255,255,1)':'rgba(255,255,255,0.5)';
    }
    // Show gradient masks when bars are tall
    var show=lvl>0.3;
    document.getElementById('fadeL').style.display=show?'block':'none';
    document.getElementById('fadeR').style.display=show?'block':'none';
  }
  function upd(){var m=String(Math.floor(s/60)).padStart(2,'0');document.getElementById('timer').textContent=m+':'+String(s%60).padStart(2,'0')}

  window.sayitOnRecordingStarted=function(){
    s=0;upd();
    document.getElementById('idleBars').style.display='none';
    document.getElementById('card').style.display='flex';
    document.getElementById('dot').className='dot on';
    document.getElementById('dotR').className='dot on';
    document.getElementById('status').textContent='';
    document.getElementById('status').className='status';
    document.getElementById('timer').style.display='';
    document.getElementById('btnX').classList.add('show');
    document.getElementById('btnOk').classList.add('show');
    anim=requestAnimationFrame(run);
    timer=setInterval(function(){s++;upd()},1000);
  };
  window.sayitOnRecordingStopped=function(){
    clearInterval(timer);cancelAnimationFrame(anim);
    document.getElementById('dot').className='dot';
    document.getElementById('dotR').className='dot';
    document.getElementById('status').textContent='Thinking';
    document.getElementById('status').className='status thinking';
    document.getElementById('timer').style.display='none';
    document.getElementById('btnX').classList.remove('show');
    document.getElementById('btnOk').classList.remove('show');
    bars.forEach(function(b){b.style.height='2px'});
    document.getElementById('fadeL').style.display='none';
    document.getElementById('fadeR').style.display='none';
  };
  window.sayitOnRmsLevel=function(v){lvl=Math.min(1,Math.max(0,v))};
  window.sayitOnTick=function(sec){s=sec;upd()};
  window.sayitOnPipelineDone=function(){
    clearInterval(timer);cancelAnimationFrame(anim);
    document.getElementById('dot').className='dot';
    document.getElementById('dotR').className='dot';
    document.getElementById('status').textContent='';
    document.getElementById('status').className='status';
    document.getElementById('timer').style.display='none';
    bars.forEach(function(b){b.style.height='2px'});
  };
  window.sayitOnError=function(){
    clearInterval(timer);cancelAnimationFrame(anim);
    document.getElementById('status').textContent='Error';
    document.getElementById('status').className='status';
  };
})();
</script></body></html>
