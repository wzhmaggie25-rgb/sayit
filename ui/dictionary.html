<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sayit · 个人词库</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; height: 100%; }
    body {
      margin: 0; height: 100%;
      background: var(--bg);
      font-family: var(--font-body); font-size: 14px; line-height: 1.55;
      color: var(--fg); -webkit-font-smoothing: antialiased;
    }

    .window {
      width: 100%; height: 100%;
      background: var(--bg);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 20px;
      background: var(--bg); flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg); }

    .btn-icon {
      width: 32px; height: 32px; display: grid; place-items: center;
      border: none; background: transparent; color: var(--muted);
      border-radius: 8px; cursor: pointer;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .btn-icon:hover { background: var(--fg-soft); color: var(--fg); }
    .btn-icon svg { width: 17px; height: 17px; }

    /* ─── add area ──────────────────────────────────────────────── */
    .add-bar {
      display: flex; gap: 8px; padding: 14px 20px 10px; flex-shrink: 0;
    }
    .add-input {
      flex: 1; padding: 8px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 13px; color: var(--fg); font-family: var(--font-body);
      outline: none; transition: border-color var(--motion-fast) var(--ease-standard);
    }
    .add-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px oklch(56% 0.17 255 / 0.15); }
    .add-input::placeholder { color: var(--muted); }

    .btn-add {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      border: none; background: var(--accent); color: var(--accent-on);
      font-size: 12.5px; font-weight: 500; cursor: pointer;
      font-family: var(--font-body); white-space: nowrap;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .btn-add:hover { background: var(--accent-hover); }
    .btn-add:active { transform: translateY(1px); }
    .btn-add svg { width: 14px; height: 14px; }

    .info-bar {
      font-size: 11px; color: var(--muted); padding: 0 20px 6px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ─── tag list ────────────────────────────────────────────── */
    .list-wrap { flex: 1; overflow-y: auto; padding: 0 20px 12px; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
    .tag-item {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 8px 6px 14px;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      border: 1px solid oklch(56% 0.17 255 / 0.12);
      font-size: 12.5px; font-weight: 500; color: var(--fg);
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .tag-item:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-soft); }
    .tag-text { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag-actions { display: flex; align-items: center; gap: 1px; margin-left: 2px; opacity: 0.45; transition: opacity var(--motion-fast); }
    .tag-item:hover .tag-actions { opacity: 1; }
    .tag-btn {
      display: grid; place-items: center;
      width: 22px; height: 22px; border: none; background: transparent;
      color: var(--muted); border-radius: 50%; cursor: pointer;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .tag-btn:hover { background: oklch(0% 0 0 / 0.06); }
    .tag-btn.del:hover { color: var(--danger); }
    .tag-btn.edit:hover { color: var(--accent); }
    .tag-btn svg { width: 12px; height: 12px; }

    .empty-dict {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; text-align: center; padding-bottom: 40px;
    }
    .empty-dict svg { width: 40px; height: 40px; color: var(--muted); margin-bottom: 12px; opacity: 0.25; }
    .empty-dict h3 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    .empty-dict p { font-size: 12px; color: var(--muted); margin: 0; }

    /* ─── toolbar ──────────────────────────────────────────────── */
    .toolbar {
      display: flex; gap: 8px; padding: 8px 20px; border-top: 1px solid var(--border);
      flex-shrink: 0; justify-content: flex-end;
    }
    .btn-tool {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 11px;
      font-family: var(--font-body); cursor: pointer;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .btn-tool:hover { color: var(--fg); border-color: var(--fg); }
    .btn-tool.danger:hover { color: var(--danger); border-color: var(--danger); }

    /* ─── toast ───────────────────────────────────────────────── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--fg); color: var(--bg); padding: 9px 18px;
      border-radius: var(--radius-pill); font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none; z-index: 100;
      transition: opacity var(--motion-base) var(--ease-standard);
    }
    .toast.show { opacity: 1; }

    /* ─── bottom nav ──────────────────────────────────────────── */
    .bottom-nav {
      display: flex; align-items: center; justify-content: center; gap: 32px;
      height: 48px; border-top: 1px solid var(--border); flex-shrink: 0;
      background: var(--bg);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      border: none; background: transparent; cursor: pointer;
      color: var(--muted); text-decoration: none;
      padding: 4px 16px; border-radius: var(--radius-sm);
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .nav-item:hover { color: var(--fg); }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 18px; height: 18px; }
    .nav-item span { font-size: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="window">
    <div class="app-header">
      <div class="header-left"><span class="header-title">个人词库</span></div>
      <div class="header-spacer"></div>
      <div class="header-actions">
        <button class="header-btn" id="themeToggle" title="切换主题"><svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
        <button class="header-btn minimize" onclick="window.sayitMinimize()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button class="header-btn close" onclick="window.sayitClose()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>

    <div class="add-bar">
      <input class="add-input" id="dictInput" placeholder="输入词汇，回车添加…" />
      <button class="btn-add" id="btnAdd">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加
      </button>
    </div>
    <div class="info-bar" id="countBar">共 0 个词汇</div>

    <div class="list-wrap" id="wordList">
      <div class="tag-cloud" id="tagCloud"></div>
      <div class="empty-dict" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <h3>词库为空</h3>
        <p>添加专业术语、人名、品牌名可提升识别准确率。</p>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn-tool" id="btnExport">导出全部</button>
      <button class="btn-tool danger" id="btnClear">清空词库</button>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="recorder.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <span>Sayit</span>
      </a>
      <a class="nav-item" href="history.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>历史</span>
      </a>
      <a class="nav-item active" href="dictionary.html">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>词库</span>
      </a>
      <a class="nav-item" href="settings.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>设置</span>
      </a>
    </nav>
  </div>
  <div class="toast" id="toast"></div>

  <script src="js/bridge.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    const DICT_KEY = 'sayit-dict';

    function loadDict() {
      try { return JSON.parse(localStorage.getItem(DICT_KEY) || '[]'); } catch(e) { return []; }
    }
    function saveDict(arr) { localStorage.setItem(DICT_KEY, JSON.stringify(arr)); }

    let editingIdx = -1;

    function render() {
      const dict = loadDict();
      $('#countBar').textContent = `共 ${dict.length} 个词汇`;
      const cloud = $('#tagCloud'), empty = $('#emptyState');
      cloud.innerHTML = '';
      if (dict.length === 0) {
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';
      dict.forEach((w, i) => {
        const tag = document.createElement('span');
        tag.className = 'tag-item';
        tag.innerHTML = `
          <span class="tag-text" title="${w}">${w}</span>
          <span class="tag-actions">
            <button class="tag-btn" data-action="copy" data-idx="${i}" title="复制">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="tag-btn edit" data-action="edit" data-idx="${i}" title="修改">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="tag-btn del" data-action="delete" data-idx="${i}" title="删除">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </span>`;
        cloud.appendChild(tag);
      });

      cloud.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.idx);
          const action = btn.dataset.action;
          const dict = loadDict();
          if (action === 'delete') {
            dict.splice(idx, 1);
            saveDict(dict);
            render();
            toast('已删除');
          } else if (action === 'copy') {
            navigator.clipboard.writeText(dict[idx]).then(() => toast('已复制')).catch(() => {});
          } else if (action === 'edit') {
            const newWord = prompt('修改词汇：', dict[idx]);
            if (newWord && newWord.trim() && newWord.trim() !== dict[idx]) {
              dict[idx] = newWord.trim();
              saveDict(dict);
              render();
              toast('已修改');
            }
          }
        });
      });
    }

    function addWord(word) {
      if (!word) return;
      const dict = loadDict();
      if (dict.includes(word)) {
        toast(`「${word}」已存在`);
        return;
      }
      dict.push(word);
      saveDict(dict);
      render();
      toast(`已添加「${word}」`);
    }

    $('#btnAdd').addEventListener('click', () => {
      addWord($('#dictInput').value.trim());
      $('#dictInput').value = '';
      $('#dictInput').focus();
    });
    $('#dictInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { $('#btnAdd').click(); }
    });

    $('#btnExport').addEventListener('click', () => {
      const dict = loadDict();
      if (!dict.length) return;
      navigator.clipboard.writeText(dict.join('\n')).then(() => toast('已复制到剪贴板')).catch(() => {});
    });
    $('#btnClear').addEventListener('click', () => {
      if (!confirm('确定清空全部词汇？此操作不可撤销。')) return;
      saveDict([]);
      render();
      toast('词库已清空');
    });

    function toast(msg) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    /* ─── theme ────────────────────────────────────────────────── */
    const html = document.documentElement, themeIcon = $('#themeIcon');
    function getActiveMode() { return localStorage.getItem('sayit-theme') || 'light'; }
    function applyThemeMode(m) {
      if (m === 'system') html.setAttribute('data-theme', window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      else html.setAttribute('data-theme', m);
      localStorage.setItem('sayit-theme', m);
      updateIcon();
    }
    function updateIcon() {
      const m = getActiveMode();
      if (m === 'light') themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
      else if (m === 'dark') themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      else themeIcon.innerHTML = '<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';
    }
    applyThemeMode(getActiveMode());
    const themeCycle = ['light', 'dark', 'system'];
    $('#themeToggle').addEventListener('click', () => applyThemeMode(themeCycle[(themeCycle.indexOf(getActiveMode()) + 1) % 3]));
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (getActiveMode() === 'system') applyThemeMode('system'); });

    render();
    window.addEventListener('storage', e => { if (e.key === DICT_KEY) render(); });
    window.sayitMinimize=function(){if(window.pywebview&&window.pywebview.api)window.pywebview.api.minimize_window()};
    window.sayitClose=function(){if(window.pywebview&&window.pywebview.api)window.pywebview.api.close_window()};
  </script>
</body>
</html>
