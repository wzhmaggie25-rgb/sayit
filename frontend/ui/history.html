<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sayit · 历史记录</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; height: 100%; }
    body {
      margin: 0; height: 100%;
      background: var(--bg);
      font-family: var(--font-body); font-size: 14px; line-height: 1.55;
      color: var(--fg); -webkit-font-smoothing: antialiased;
    }

    .window {
      width: 100%; height: 100%;
      background: var(--bg);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 20px;
      background: var(--bg); flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg); }

    .btn-icon {
      width: 32px; height: 32px; display: grid; place-items: center;
      border: none; background: transparent; color: var(--muted);
      border-radius: 8px; cursor: pointer;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .btn-icon:hover { background: var(--fg-soft); color: var(--fg); }
    .btn-icon svg { width: 17px; height: 17px; }

    /* ─── search ──────────────────────────────────────────────────── */
    .search-bar {
      padding: 12px 20px; flex-shrink: 0;
    }
    .search-wrap {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0 12px;
      transition: border-color var(--motion-fast) var(--ease-standard);
    }
    .search-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px oklch(56% 0.17 255 / 0.15); }
    .search-wrap svg { width: 15px; height: 15px; color: var(--muted); flex-shrink: 0; }
    .search-wrap input {
      flex: 1; border: none; background: transparent; padding: 8px 10px;
      font-size: 13px; color: var(--fg); font-family: var(--font-body); outline: none;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-count { font-size: 12px; color: var(--muted); font-family: var(--font-mono); padding-left: 8px; }

    /* ─── list ────────────────────────────────────────────────────── */
    .list { flex: 1; overflow-y: auto; padding: 0 20px 12px; }
    .list.loading { opacity: 0.5; pointer-events: none; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 8px;
      cursor: pointer; transition: all var(--motion-fast) var(--ease-standard);
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 2px 10px oklch(0% 0 0 / 0.03); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .card-date { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .card-meta { display: flex; align-items: center; gap: 8px; }
    .card-dur { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .card-app { font-size: 10.5px; color: var(--muted); padding: 2px 8px; background: var(--fg-soft); border-radius: var(--radius-pill); }
    .card-status { font-size: 10.5px; color: var(--muted); padding: 2px 8px; border: 1px solid var(--border); border-radius: var(--radius-pill); }
    .card-status.good { color: var(--success); border-color: var(--success); }
    .card-status.warn { color: var(--warn); border-color: var(--warn); }
    .card-text { font-size: 13px; color: var(--fg); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .btn-sm {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
      border-radius: 6px; border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 11px; font-weight: 500; cursor: pointer;
      font-family: var(--font-body); transition: all var(--motion-fast) var(--ease-standard);
    }
    .btn-sm:hover { color: var(--fg); border-color: var(--fg); }
    .btn-sm.danger:hover { color: var(--danger); border-color: var(--danger); }
    .btn-sm svg { width: 12px; height: 12px; }

    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding-bottom: 40px; }
    .empty svg { width: 44px; height: 44px; color: var(--muted); margin-bottom: 14px; opacity: 0.3; }
    .empty h3 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    .empty p { font-size: 12px; color: var(--muted); margin: 0; }

    /* ─── spinner ──────────────────────────────────────────────────── */
    .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 32px; }
    .spinner {
      width: 24px; height: 24px; border: 2.5px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── detail ──────────────────────────────────────────────────── */
    .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; background: oklch(0% 0 0 / 0.2); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .panel { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); width: 500px; max-height: 440px; display: flex; flex-direction: column; box-shadow: 0 12px 40px oklch(0% 0 0 / 0.12); overflow: hidden; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; }
    .panel-close { width: 28px; height: 28px; display: grid; place-items: center; border: none; background: transparent; color: var(--muted); border-radius: 6px; cursor: pointer; font-size: 15px; transition: all var(--motion-fast) var(--ease-standard); }
    .panel-close:hover { background: var(--fg-soft); color: var(--fg); }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.75; color: var(--fg); }
    .panel-edit-area { width: 100%; min-height: 200px; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body); line-height: 1.75; color: var(--fg); background: var(--bg); resize: vertical; outline: none; }
    .panel-edit-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px oklch(56% 0.17 255 / 0.15); }
    .panel-actions { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); justify-content: flex-end; }
    .btn-accent { display: inline-flex; align-items: center; gap: 4px; padding: 7px 16px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: var(--accent-on); font-size: 12.5px; font-weight: 500; cursor: pointer; font-family: var(--font-body); transition: all var(--motion-fast) var(--ease-standard); }
    .btn-accent:hover { background: var(--accent-hover); }

    /* ─── bottom nav ──────────────────────────────────────────────── */
    /* ─── retention & privacy ──────────────────────────────────────── */
    .retention-bar {
      display: flex; align-items: center; padding: 0 20px 10px; gap: 12px; flex-shrink: 0;
      border-bottom: 1px solid var(--border); margin: 0 0 4px;
    }
    .retention-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .retention-select {
      padding: 3px 6px; font-size: 11px; border: 1px solid var(--border); border-radius: 5px;
      background: var(--surface); color: var(--fg); font-family: var(--font-body); cursor: pointer;
      outline: none; transition: border-color var(--motion-fast) var(--ease-standard);
    }
    .retention-select:focus { border-color: var(--accent); }
    .privacy-note {
      display: flex; align-items: center; gap: 4px; font-size: 10.5px; color: var(--muted);
      margin-left: auto; white-space: nowrap;
    }
    .privacy-note svg { width: 11px; height: 11px; flex-shrink: 0; }

    .bottom-nav {
      display: flex; align-items: center; justify-content: center; gap: 32px;
      height: 48px; border-top: 1px solid var(--border); flex-shrink: 0;
      background: var(--bg);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      border: none; background: transparent; cursor: pointer;
      color: var(--muted); text-decoration: none;
      padding: 4px 16px; border-radius: var(--radius-sm);
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .nav-item:hover { color: var(--fg); }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 18px; height: 18px; }
    .nav-item span { font-size: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="window">
    <div class="app-header">
      <div class="header-left"><span class="header-title">历史记录</span></div>
      <div class="header-spacer"></div>
      <div class="header-actions">
        <button class="header-btn" id="themeToggle" title="切换主题">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="header-btn minimize" onclick="window.sayitMinimize()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button class="header-btn close" onclick="window.sayitClose()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>

    <div class="search-bar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="搜索历史记录…" />
        <span class="search-count" id="resultCount">0 条</span>
      </div>
    </div>


    <div class="list" id="transcriptList">
      <div class="spinner-wrap" id="loadingSpinner"><div class="spinner"></div></div>
    </div>
    <div class="empty" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <h3>还没有录音记录</h3><p>开始录音后，转写内容会自动保存在这里。</p>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="recorder.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <span>Sayit</span>
      </a>
      <a class="nav-item active" href="history.html">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>历史</span>
      </a>
      <a class="nav-item" href="dictionary.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>词库</span>
      </a>
      <a class="nav-item" href="settings.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>设置</span>
      </a>
    </nav>
  </div>

  <div class="overlay" id="detailOverlay" style="display:none;">
    <div class="panel">
      <div class="panel-header"><span id="detailDate"></span><button class="panel-close" id="detailClose">&#10005;</button></div>
      <div class="panel-body" id="detailBody"></div>
    </div>
  </div>

  <div class="overlay" id="editOverlay" style="display:none;">
    <div class="panel">
      <div class="panel-header"><span id="editDate"></span><button class="panel-close" id="editClose">&#10005;</button></div>
      <div class="panel-body" style="padding:16px 20px;">
        <textarea class="panel-edit-area" id="editArea" placeholder="修正文字…"></textarea>
      </div>
      <div class="panel-actions">
        <button class="btn-sm" id="editCancel">取消</button>
        <button class="btn-accent" id="editSave">保存修正</button>
      </div>
    </div>
  </div>

  <script src="js/bridge.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    let transcripts = [];
    let isLoading = false;
    let refreshTimer = null;

    // ── Helpers ──────────────────────────────────────────────────
    function fmtDuration(sec) {
      if (!sec && sec !== 0) return '--';
      var s = Math.round(sec || 0);
      var m = Math.floor(s / 60);
      s = s % 60;
      return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    function fmtDate(ts) {
      if (!ts) return '';
      // Handle both ISO string and 'YYYY-MM-DD HH:MM:SS' format
      var d = new Date(ts);
      if (isNaN(d.getTime())) {
        // Try parsing as 'YYYY-MM-DD HH:MM:SS'
        var parts = ts.split(/[\sT]/);
        return parts[0] + ' ' + (parts[1]||'').substring(0,5);
      }
      var y = d.getFullYear();
      var mo = String(d.getMonth()+1).padStart(2,'0');
      var da = String(d.getDate()).padStart(2,'0');
      var h = String(d.getHours()).padStart(2,'0');
      var mi = String(d.getMinutes()).padStart(2,'0');
      return y + '-' + mo + '-' + da + ' ' + h + ':' + mi;
    }

    function getText(t) {
      return t.final_text || t.refined_text || t.text || t.raw_text || '';
    }

    function statusClass(status) {
      if (status === 'EXTRACTED') return 'good';
      if (status && status !== 'NOT_MODIFIED' && status !== 'TRACKING') return 'warn';
      return '';
    }

    function scheduleRefresh(delay) {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(function() {
        loadHistory($('#searchInput').value || '');
      }, delay || 300);
    }

    // ── API: load history ────────────────────────────────────────
    async function loadHistory(search) {
      isLoading = true;
      showLoading(true);
      try {
        if (window.sayit) {
          transcripts = await window.sayit.getHistory(search || '', 500, 0) || [];
        } else {
          transcripts = [];
        }
      } catch(e) {
        console.warn('loadHistory failed:', e);
        transcripts = [];
      }
      isLoading = false;
      showLoading(false);
      renderList();
    }

    function showLoading(show) {
      var spinner = $('#loadingSpinner');
      var list = $('#transcriptList');
      if (show) {
        if (spinner) spinner.style.display = '';
        if (list) list.classList.add('loading');
      } else {
        if (spinner) spinner.style.display = 'none';
        if (list) list.classList.remove('loading');
      }
    }

    // ── Render ──────────────────────────────────────────────────
    function renderList() {
      $('#resultCount').textContent = transcripts.length + ' 条';
      var list = $('#transcriptList'), empty = $('#emptyState');
      var spinner = $('#loadingSpinner');

      if (transcripts.length === 0) {
        list.style.display = 'none'; empty.style.display = '';
        if (spinner) spinner.style.display = 'none';
        return;
      }
      empty.style.display = 'none'; list.style.display = '';
      if (spinner) spinner.style.display = 'none';

      list.innerHTML = transcripts.map(function(t) {
        var txt = getText(t);
        var escaped = txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        var appLabel = t.app_exe || '';
        var editStatus = t.edited_text_status || '';
        return '<div class="card" onclick="openDetail(\'' + t.id + '\')">' +
          '<div class="card-header"><span class="card-date">' + fmtDate(t.created_at) + '</span>' +
          '<div class="card-meta">' + (appLabel ? '<span class="card-app">' + appLabel + '</span>' : '') +
          (editStatus ? '<span class="card-status ' + statusClass(editStatus) + '">' + editStatus + '</span>' : '') +
          '<span class="card-dur">' + fmtDuration(t.duration) + '</span></div></div>' +
          '<div class="card-text">' + escaped + '</div>' +
          '<div class="card-actions" onclick="event.stopPropagation()">' +
            '<button class="btn-sm" onclick="copyTranscript(\'' + t.id + '\')" title="复制"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' +
            '<button class="btn-sm" style="color:var(--accent);border-color:var(--accent);" onclick="editTranscript(\'' + t.id + '\')" title="修正"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
            '<button class="btn-sm danger" onclick="deleteTranscript(\'' + t.id + '\')" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' +
          '</div></div>';
      }).join('');
    }

    // ── Detail overlay ──────────────────────────────────────────
    function openDetail(id) {
      var t = transcripts.find(function(x) { return String(x.id) === String(id); });
      if (!t) return;
      $('#detailDate').textContent = fmtDate(t.created_at) + ' · ' + fmtDuration(t.duration) + (t.app_exe ? ' · ' + t.app_exe : '');
      var txt = getText(t);
      $('#detailBody').innerHTML = txt.split('\n').filter(function(p) { return p.trim(); }).map(function(p) { return '<p style="margin:0 0 8px">' + p + '</p>'; }).join('');
      $('#detailOverlay').style.display = '';
    }

    function copyTranscript(id) {
      var t = transcripts.find(function(x) { return String(x.id) === String(id); });
      if (t) navigator.clipboard.writeText(getText(t)).catch(function() {});
    }

    // ── Delete (optimistic UI) ──────────────────────────────────
    async function deleteTranscript(id) {
      var oldTranscripts = transcripts.slice();
      transcripts = transcripts.filter(function(x) { return String(x.id) !== String(id); });
      renderList();
      try {
        if (window.sayit) await window.sayit.api('DELETE', '/api/history/' + encodeURIComponent(id));
      } catch(e) {
        transcripts = oldTranscripts;
        renderList();
        alert('删除失败，请重试');
      }
    }

    // ── Edit / correction ───────────────────────────────────────
    var editTargetId = null;
    function editTranscript(id) {
      var t = transcripts.find(function(x) { return String(x.id) === String(id); });
      if (!t) return;
      editTargetId = id;
      $('#editDate').textContent = fmtDate(t.created_at) + ' · ' + fmtDuration(t.duration);
      $('#editArea').value = getText(t);
      $('#editOverlay').style.display = '';
      setTimeout(function() { $('#editArea').focus(); }, 100);
    }

    function closeEdit() { $('#editOverlay').style.display = 'none'; editTargetId = null; }

    $('#editClose').addEventListener('click', closeEdit);
    $('#editCancel').addEventListener('click', closeEdit);
    $('#editOverlay').addEventListener('click', function(e) { if (e.target === $('#editOverlay')) closeEdit(); });

    // ── Save correction (optimistic UI) ─────────────────────────
    $('#editSave').addEventListener('click', async function() {
      if (editTargetId === null) return;
      var newText = $('#editArea').value.trim();
      if (!newText) return;
      var t = transcripts.find(function(x) { return String(x.id) === String(editTargetId); });
      if (!t) return;
      var oldText = getText(t);

      // Optimistic: update local state immediately
      if (t.final_text !== undefined) t.final_text = newText;
      else if (t.refined_text !== undefined) t.refined_text = newText;
      else t.text = newText;
      var oldTranscripts = transcripts.slice();
      renderList();
      closeEdit();

      // Async API
      try {
        if (window.sayit) await window.sayit.api('PUT', '/api/history/' + encodeURIComponent(editTargetId), {text: newText, final_text: newText});
      } catch(e) {
        // Rollback
        transcripts = oldTranscripts;
        renderList();
        alert('保存修正失败，请重试');
      }
    });

    // ── Overlay close handlers ──────────────────────────────────
    $('#detailClose').addEventListener('click', function() { $('#detailOverlay').style.display = 'none'; });
    $('#detailOverlay').addEventListener('click', function(e) { if (e.target === $('#detailOverlay')) $('#detailOverlay').style.display = 'none'; });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { $('#detailOverlay').style.display = 'none'; closeEdit(); } });

    // ── Search with 300ms debounce ──────────────────────────────
    var searchTimer = null;
    $('#searchInput').addEventListener('input', function(e) {
      clearTimeout(searchTimer);
      var val = e.target.value;
      searchTimer = setTimeout(function() {
        loadHistory(val);
      }, 300);
    });

    window.addEventListener('focus', function() { scheduleRefresh(150); });
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) scheduleRefresh(150);
    });
    if (window.sayit && window.sayit.onBackendEvent) {
      window.sayit.onBackendEvent(function(evt) {
        if (!evt || !evt.event) return;
        if (evt.event === 'pipeline_done' || evt.event === 'silent_learned' || evt.event === 'injection_done') {
          scheduleRefresh(evt.event === 'silent_learned' ? 100 : 500);
        }
      });
    }

    // ── Theme ───────────────────────────────────────────────────
    var html2 = document.documentElement, themeIcon = $('#themeIcon');
    function getActiveMode() { return localStorage.getItem('sayit-theme') || 'light'; }
    function applyThemeMode(m) {
      if (m === 'system') html2.setAttribute('data-theme', window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      else html2.setAttribute('data-theme', m);
      localStorage.setItem('sayit-theme', m);
      updateIcon();
    }
    function updateIcon() {
      var m = getActiveMode();
      if (m === 'light') themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
      else if (m === 'dark') themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      else themeIcon.innerHTML = '<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';
    }
    applyThemeMode(getActiveMode());
    var themeCycle = ['light', 'dark', 'system'];
    $('#themeToggle').addEventListener('click', function() { applyThemeMode(themeCycle[(themeCycle.indexOf(getActiveMode()) + 1) % 3]); });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() { if (getActiveMode() === 'system') applyThemeMode('system'); });
    window.sayitMinimize = function() { if (window.sayit) window.sayit.minimize(); };
    window.sayitClose = function() { if (window.sayit) window.sayit.close(); };


    // ── Init ────────────────────────────────────────────────────
    loadHistory('');
  </script>
</body>
</html>
