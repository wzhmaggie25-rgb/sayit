<!doctype html>
<html><head><meta charset="utf-8"><title>Float v5 Test</title>
<style>
  body{background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:48px;font-family:system-ui}
  .row{display:flex;flex-direction:column;align-items:center;gap:6px}
  .label{color:#999;font-size:12px}
  @keyframes micPulse{0%,100%{opacity:.2}50%{opacity:.7}}
  @keyframes recBlink{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes sweep{0%{left:-100%}100%{left:100%}}
</style>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
</head><body>

<div class="row"><div class="label">IDLE (hover)</div><div id="idle"></div></div>
<div class="row"><div class="label">REC 无声</div><div id="rec0"></div></div>
<div class="row"><div class="label">REC 有声</div><div id="rec1"></div></div>
<div class="row"><div class="label">THINKING</div><div id="think"></div></div>
<div class="row"><div class="label">ERROR</div><div id="err"></div></div>

<script>
const {useState,useEffect,useRef,createElement:h}=React;

function AudioBars({volume}){
  const [bars,set]=useState(()=>Array(20).fill(.35));
  const vr=useRef(0);vr.current=volume;
  const ph=useRef(Array.from({length:20},(_,i)=>Math.sin(i/19*Math.PI)));
  useEffect(()=>{let id;function l(){id=requestAnimationFrame(l);const v=vr.current;
    set(p=>p.map((x,i)=>{const t=.35+v*.65*ph.current[i];return x+(t-x)*.12}));}l();return()=>cancelAnimationFrame(id)},[]);
  return h('div',{style:{display:'flex',alignItems:'flex-end',gap:1.5,height:20,flex:1,justifyContent:'center'}},
    bars.map((v,i)=>h('div',{style:{width:2,height:2+v*18,borderRadius:9999,flexShrink:0,background:volume>.03?'#fff':'rgba(255,255,255,.45)'},key:i})))
}

function Sweep(){
  return h('div',{style:{position:'absolute',top:0,bottom:0,width:'30%',
    background:'linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)',
    animation:'sweep 1.5s ease-in-out infinite',pointerEvents:'none',zIndex:0}})
}

function Btn({children}){
  return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',
    width:22,height:22,borderRadius:11,background:'#fff',color:'#000',
    fontSize:12,fontWeight:700,flexShrink:0}},children)
}

function Show({state,volume}){
  const [hover,sh]=useState(false);
  const idle=state==='idle',rec=state==='rec',think=state==='think',err=state==='err';
  const W=idle?32:(rec?160:100);
  return h('div',{style:{display:'flex',flexDirection:'row',alignItems:'center',
    justifyContent:'center',position:'relative',borderRadius:16,overflow:'hidden',
    background:'rgba(0,0,0,1)',border:'1px solid rgba(255,255,255,.1)',
    height:idle?22:(rec?24:26),padding:idle?'2px 6px':'3px 8px',
    width:W,transition:'width .25s ease'},
    onMouseEnter:()=>sh(true),onMouseLeave:()=>sh(false)},
    idle&&h('div',{style:{width:4,height:4,borderRadius:2,background:'#fff',
      opacity:hover?.7:.2,transition:'opacity .3s ease',
      animation:hover?'micPulse 2s ease-in-out infinite':'none'}}),
    rec&&h('div',{style:{display:'flex',alignItems:'center',gap:6,flex:1}},
      h('div',{style:{width:4,height:4,borderRadius:2,background:'#ef4444',flexShrink:0,
        animation:'recBlink .8s ease-in-out infinite'}}),
      h(AudioBars,{volume:volume||0}),
      h(Btn,null,'\u2713')),
    think&&h('div',{style:{position:'relative',flex:1,height:20,display:'flex',
      alignItems:'center',justifyContent:'center',overflow:'hidden',borderRadius:12}},
      h(Sweep),h('span',{style:{fontSize:12,color:'rgba(255,255,255,.55)',position:'relative',zIndex:1}},'处理中')),
    err&&h('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center'},
      h('span',{style:{fontSize:12,color:'rgba(255,100,100,.8)'}},'Error')}))
}

ReactDOM.createRoot(document.getElementById('idle')).render(h(Show,{state:'idle'}));
ReactDOM.createRoot(document.getElementById('rec0')).render(h(Show,{state:'rec',volume:0}));
ReactDOM.createRoot(document.getElementById('rec1')).render(h(Show,{state:'rec',volume:.6}));
ReactDOM.createRoot(document.getElementById('think')).render(h(Show,{state:'think'}));
ReactDOM.createRoot(document.getElementById('err')).render(h(Show,{state:'err'}));
</script></body></html>
