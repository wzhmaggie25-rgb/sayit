<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:transparent;font-family:system-ui;user-select:none;pointer-events:none}
  body{display:flex;align-items:flex-end;justify-content:center;padding:8px}
  @keyframes micPulse{0%,100%{opacity:.2}50%{opacity:.7}}
  @keyframes recBlink{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes sweep{0%{left:-100%}100%{left:100%}}
  @keyframes errFlash{0%{background:rgba(220,38,38,.4)}100%{background:transparent}}
</style>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
</head><body><div id="root"></div><script>
const {useState,useEffect,useRef,useReducer,useCallback,createElement:h}=React;

/* ── state ── */
const INIT='init',REC='rec',THINK='think',DONE='done',ERR='err';

function rdc(st,a){
  a=typeof a==='string'?a:a?.type;if(!a)return st;const s=st.s;
  if(a==='RECORD.START'){if(!s||s===DONE||s===ERR)return{s:INIT}}
  if(a==='RECORD.STOP'){if(s===INIT)return{s:REC};if(s===REC)return{s:THINK,target:'done'}}
  if(a==='CANCEL'){if(s===REC)return{s:THINK,target:'idle'}}
  if(a==='ERROR'){if(s===REC)return{s:ERR}}
  if(a==='_DONE'&&s===THINK)return{s:DONE};
  if(a==='_RESET')return{s:null};
  return st;
}

/* ── AudioBars (starts mid, goes high) ── */
function AudioBars({volume}){
  const [bars,set]=useState(()=>Array(20).fill(.35));
  const vr=useRef(0);vr.current=volume;
  const ph=useRef(Array.from({length:20},(_,i)=>Math.sin(i/19*Math.PI)));
  useEffect(()=>{let id;function l(){id=requestAnimationFrame(l);const v=vr.current;
    set(p=>p.map((x,i)=>{const t=.35+v*.65*ph.current[i];return x+(t-x)*.12}));}l();return()=>cancelAnimationFrame(id)},[]);
  return h('div',{style:{display:'flex',alignItems:'flex-end',gap:1.5,height:20,flex:1,justifyContent:'center'}},
    bars.map((v,i)=>h('div',{key:i,style:{width:2,height:2+v*18,borderRadius:9999,flexShrink:0,background:volume>.03?'#fff':'rgba(255,255,255,.45)'}})))
}

/* ── Sweep (left→right light scan) ── */
function Sweep(){
  return h('div',{style:{position:'absolute',top:0,bottom:0,width:'30%',
    background:'linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)',
    animation:'sweep 1.5s ease-in-out infinite',pointerEvents:'none',zIndex:0}})
}

/* ── Btn ── */
function Btn({bg,hoverBg,color,children,onClick}){
  const [hv,set]=useState(false);const [pr,sp]=useState(false);
  return h('button',{onClick,style:{display:'flex',alignItems:'center',justifyContent:'center',
    width:22,height:22,borderRadius:11,border:'none',background:pr?'rgba(80,80,80,1)':(hv?hoverBg:bg),
    color:color||'#fff',fontSize:12,fontWeight:color==='#000'?700:400,flexShrink:0,
    transition:'background .12s ease,transform .08s ease',transform:pr?'scale(.9)':'scale(1)'},
    onMouseEnter:()=>set(true),onMouseLeave:()=>{set(false);sp(false)},
    onMouseDown:()=>sp(true),onMouseUp:()=>sp(false)},children)
}

/* ── Float ── */
function Float(){
  const [st,d]=useReducer(rdc,{s:null});const [vol,sv]=useState(0);
  const ref=useRef(null);const [hover,sh]=useState(false);

  const report=useCallback(()=>{if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    window.sayit&&window.sayit.sendElementPositions([{left:r.left,top:r.top,right:r.right,bottom:r.bottom}]);},[]);

  /* state machine timers */
  useEffect(()=>{const s=st.s;
    if(s===INIT){const t=setTimeout(()=>d('RECORD.STOP'),60);return()=>clearTimeout(t)}
    if(s===REC)return;
    const tt=[];
    if(s===THINK){const tg=st.target==='idle'?'_RESET':'_DONE';tt.push(setTimeout(()=>d(tg),tg==='_RESET'?300:800))}
    if(s===DONE)tt.push(setTimeout(()=>{d('_RESET');window.sayit&&window.sayit.clearElementPositions()},2000));
    if(s===ERR)tt.push(setTimeout(()=>{d('_RESET');window.sayit&&window.sayit.clearElementPositions()},2000));
    return()=>tt.forEach(clearTimeout)},[st.s]);

  useEffect(()=>{setTimeout(report,100)},[st.s,report]);

  useEffect(()=>{window.sayitOnRecordingStarted=()=>d('RECORD.START');
    window.sayitOnRecordingStopped=()=>d('RECORD.STOP');
    window.sayitOnPipelineDone=()=>d('RECORD.STOP');
    window.sayitOnError=()=>d('ERROR');
    window.sayitOnRmsLevel=v=>sv(v);window.sayitOnTick=()=>{};
    window.sayitOnAsrResult=()=>{};window.sayitOnAiResult=()=>{};},[]);

  const s=st.s,idle=!s||s===INIT;
  const W=idle?32:(s===REC?160:100);

  return h('div',{ref,style:{display:'flex',flexDirection:'row',alignItems:'center',
    justifyContent:'center',position:'relative',borderRadius:16,overflow:'hidden',
    background:'rgba(0,0,0,1)',border:'1px solid rgba(255,255,255,.1)',
    height:idle?22:(s===REC?24:26),padding:idle?'2px 6px':'3px 8px',
    width:W,transition:'width .25s ease',cursor:s===REC?'default':undefined},
    onMouseEnter:()=>sh(true),onMouseLeave:()=>sh(false)},

    /* idle: mic dot */
    idle&&h('div',{style:{width:4,height:4,borderRadius:2,background:'#fff',
      opacity:hover?.7:.2,transition:'opacity .3s ease',
      animation:hover?'micPulse 2s ease-in-out infinite':'none'}}),

    /* recording */
    s===REC&&h('div',{style:{display:'flex',alignItems:'center',gap:6,flex:1}},
      h('div',{style:{width:4,height:4,borderRadius:2,background:'#ef4444',flexShrink:0,
        animation:'recBlink .8s ease-in-out infinite'}}),
      h(AudioBars,{volume:vol}),
      h(Btn,{bg:'#fff',hoverBg:'rgba(240,240,240,1)',color:'#000',onClick:()=>d('RECORD.STOP')},'\u2713')
    ),

    /* thinking */
    (s===THINK||s===DONE)&&h('div',{style:{position:'relative',flex:1,height:20,
      display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
      borderRadius:12}},
      s===THINK&&h(Sweep),
      h('span',{style:{fontSize:12,color:'rgba(255,255,255,.55)',position:'relative',zIndex:1,
        fontWeight:400}},s===THINK?'处理中':'Done')
    ),

    /* error */
    s===ERR&&h('div',{style:{position:'absolute',inset:0,
      animation:'errFlash .5s ease-out forwards',pointerEvents:'none'}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Float));
</script></body></html>
